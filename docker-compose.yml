services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: snapshot
      POSTGRES_PASSWORD: snapshot
      POSTGRES_DB: market_snapshot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snapshot -d market_snapshot"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
    # Load secrets from the project root `.env` (next to this file). `required: false` allows running
    # without a file. Values here are injected into the container; explicit `environment` below still
    # overrides per key (e.g. DATABASE_URL must point at the `db` service, not localhost).
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql://snapshot:snapshot@db:5432/market_snapshot
      SNAPSHOT_CRON_HOUR: ${SNAPSHOT_CRON_HOUR:-16}
      SNAPSHOT_CRON_MINUTE: ${SNAPSHOT_CRON_MINUTE:-0}
      INTRADAY_REFRESH_MINUTES: ${INTRADAY_REFRESH_MINUTES:-0}
      API_CORS_ORIGINS: http://localhost:5173,http://localhost:8080
      DISABLE_FINBERT: 1
      # Slow down Yahoo v8 chart calls if you see 429 (rate limit); default 0.25s between requests
      YAHOO_CHART_MIN_INTERVAL: ${YAHOO_CHART_MIN_INTERVAL:-0.25}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  web:
    build:
      context: ./frontend
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  pgdata:
